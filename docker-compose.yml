# Root orchestrator — brings up api + monitoring stack together (ADR 0028 Phase 3).
#
# Usage:
#   docker compose up -d          # api + prometheus + grafana + blackbox
#   docker compose logs -f api    # tail API container
#   docker compose down           # stop everything (preserve volumes)
#   docker compose down -v        # stop + wipe persistent volumes (prom/grafana data)
#
# Optional logging stack (heavy — ~2 GiB RAM for ES+Kibana) is separate; bring it up via:
#   docker compose -f services/monitoring/docker-compose.logging.yml up -d
#
# The monitoring services live in services/monitoring/ and use volume paths relative
# to that directory. We include them rather than copying their definitions so
# `services/monitoring/docker-compose.observability.yml` remains the single source of
# truth for the observability stack (it can still be run standalone).

include:
  - path: services/monitoring/docker-compose.observability.yml
  # Elasticsearch + Kibana + Filebeat. ~2 GiB RAM combined; included so a plain
  # `make up` gives you searchable logs at Kibana :5601 without a second command.
  # Standalone bring-up (without the API stack) still works via
  # `docker compose -f services/monitoring/docker-compose.logging.yml up -d`.
  - path: services/monitoring/docker-compose.logging.yml

services:
  postgres:
    # ADR 0037: runtime persistence. Single-node Postgres 16 in a compose service.
    # Data volume lives at ./var/postgres on the host (gitignored via `var/`).
    image: postgres:16-alpine
    container_name: study-app-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-study_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-study_app}
      POSTGRES_DB: ${POSTGRES_DB:-study_app}
    volumes:
      - ./var/postgres:/var/lib/postgresql/data
    ports:
      # Exposed for local psql / dev tools. Not consumed by the api service —
      # api reaches Postgres over the compose network as `postgres:5432`.
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-study_app} -d ${POSTGRES_DB:-study_app}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  api:
    build:
      context: ./services/api
    image: study-app-api:local
    container_name: study-app-api
    # Layered env per ADR 0010 · «Where each key lives»:
    #
    #   1. env/<profile>   — public behavior: CORS_ALLOW_ORIGINS, API_AUTH_KEY
    #                        (dev-default), JWT_SECRET (dev-default),
    #                        rate limits, LOG_LEVEL, etc. Committed to git.
    #   2. .env            — private secrets: real TELEGRAM_BOT_TOKEN,
    #                        OPENROUTER_API_KEY, GRAFANA creds, etc.
    #                        Git-ignored; overrides the empty slots in env/*.
    #   3. environment:    — container-specific overrides that MUST differ
    #                        from the host-run values (bind address = 0.0.0.0
    #                        so uvicorn listens outside the container,
    #                        DATABASE_URL pointing at the compose postgres
    #                        service, log path inside /var/log/study-app).
    #
    # `required: false` on the env_file entries — if a fresh clone hasn't
    # generated .env yet, compose still boots and the config guards in
    # config.py catch the resulting empty secrets (with a clear error).
    env_file:
      - path: ./env/${APP_ENV:-dev}
        required: false
      - path: ./.env
        required: false
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_HOST: 0.0.0.0
      APP_PORT: "8000"
      # ADR 0037: single DB knob. Points at the compose postgres service.
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://study_app:study_app@postgres:5432/study_app}
      LOG_DIR: /var/log/study-app
      LOG_FORMAT: ${LOG_FORMAT:-json}
      LOG_SERVICE_NAME: study-app-api
    volumes:
      # Logs land in repo-root logs/ on the host (gitignored) so they are visible
      # to filebeat when the optional logging stack runs.
      - ./logs:/var/log/study-app
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    # Prometheus scrapes the API at host.docker.internal:8000 (configured in
    # services/monitoring/prometheus/prometheus.yml). We don't depends_on
    # prometheus here because the API can come up before observability.
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/live', timeout=2)"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
