name: Docs Feedback Cadence

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Do not create/update issue, only log planned changes"
        required: false
        default: "true"

jobs:
  docs-feedback-triage:
    name: Open or refresh docs feedback triage issue
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Build docs feedback cadence report
        uses: actions/github-script@v7
        env:
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        with:
          script: |
            const run = require('./services/portal/scripts/docs_feedback_cadence.js');
            const dryRun = String(process.env.DRY_RUN || 'false').toLowerCase() === 'true';
            await run({ github, context, core, dryRun });
