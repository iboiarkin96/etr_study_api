# Weekly safety net for WCAG baseline checks. PR/push runs of `make docs-a11y-check`
# are covered by the `docs-a11y` job in `ci.yml`; this workflow exists so the gate
# also fires on a schedule when no PRs are merged.
name: A11y Formal Checks (Scheduled)

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  docs-a11y:
    name: WCAG baseline docs accessibility checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-venv

      - name: Run docs accessibility baseline (WCAG)
        run: make docs-a11y-check
