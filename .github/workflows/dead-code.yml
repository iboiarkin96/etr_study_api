# Periodic unused-code scan (Vulture). Complements PR CI (`make verify`): Ruff already
# enforces unused imports (F401) and obsolete noqa (RUF100); Vulture is heuristic and
# kept on a schedule to avoid noisy PR friction. See ADR 0014.
name: Dead Code Scan

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  vulture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-venv

      - name: Run Vulture
        run: make dead-code-check
