# Optional: draft [Unreleased] bullets via OpenAI-compatible API (repository secret).
# Does not run on forks (no secrets). Human review required before merging text into CHANGELOG.md.
name: Changelog Draft

on:
  workflow_dispatch:
    inputs:
      since:
        description: "Git ref for range start (e.g. main)"
        required: true
        default: main
      head:
        description: "Git ref for range end (e.g. HEAD)"
        required: true
        default: HEAD

jobs:
  draft:
    if: github.event.repository.fork == false
    runs-on: ubuntu-latest
    steps:
      - name: Require OPENAI_API_KEY secret
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "OPENAI_API_KEY secret is not configured for this repository."
            echo "Add it under Settings → Secrets and variables → Actions before running this workflow."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-venv

      - name: Draft changelog bullets
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          .venv/bin/python tools/governance/changelog_draft.py \
            --since "${{ inputs.since }}" \
            --head "${{ inputs.head }}"
