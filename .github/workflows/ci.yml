# Quality gate: single canonical `make verify` (deps-audit, lint, types, OpenAPI,
# contract tests, pytest + coverage floor, docs-check drift gate, docs-a11y-check).
# Local and CI workflows intentionally use the same command, so green here implies
# green pre-push.
#
# Companion jobs (docs-a11y, pr-template-check) live here too: keep all PR/push CI in one
# workflow. CD lives in `pages.yml` (Pages deploy) and the `publish-image` job below
# (GHCR image push, gated on `quality` + `changelog` success).
name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changelog:
    name: Changelog gate
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request' && (github.event.pull_request.base.ref == 'main' || github.event.pull_request.base.ref == 'master')) ||
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')))
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: PR changelog gate
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          python3 scripts/changelog_gate.py \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}" \
            --event pr

      - name: Push changelog gate
        if: github.event_name == 'push'
        run: |
          python3 scripts/changelog_gate.py \
            --base "${{ github.event.before }}" \
            --head "${{ github.event.after }}" \
            --event push

  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-venv

      - name: Run make verify
        run: make verify

      - name: Pre-commit hooks
        run: .venv/bin/pre-commit run --all-files

  docs-a11y:
    name: WCAG baseline docs accessibility checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-venv

      - name: Run docs accessibility baseline (WCAG)
        run: make docs-a11y-check

  pr-template-check:
    name: Validate PR change type selection
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Require delivery/docs-only/mixed checkbox
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail

          if [ -z "${PR_BODY:-}" ]; then
            echo "PR body is empty."
            echo "Please fill the PR template and select one change type: delivery, docs-only, or mixed."
            exit 1
          fi

          checked_count=0
          for marker in \
            "- [x] \`delivery\`" \
            "- [x] \`docs-only\`" \
            "- [x] \`mixed\`" \
            "- [X] \`delivery\`" \
            "- [X] \`docs-only\`" \
            "- [X] \`mixed\`"; do
            if [[ "${PR_BODY}" == *"${marker}"* ]]; then
              checked_count=$((checked_count + 1))
            fi
          done

          if [ "${checked_count}" -eq 0 ]; then
            echo "No PR change type selected."
            echo "Please check one option in 'Change type': delivery, docs-only, or mixed."
            exit 1
          fi

          if [ "${checked_count}" -gt 1 ]; then
            echo "Multiple PR change types selected."
            echo "Please select exactly one option in 'Change type': delivery, docs-only, or mixed."
            exit 1
          fi

          echo "PR template change type is valid."

  # CD: push the same Dockerfile artifact to GHCR after quality (and changelog on main/master).
  # Secrets: none beyond the default GITHUB_TOKEN (job permission packages:write). Runtime env
  # (DATABASE_URL, APP_ENV, …) belongs on the deployment host or PaaS — not in this workflow.
  # Pull: docker pull ghcr.io/<owner>/<repo>:<tag>
  publish-image:
    name: Publish container image (GHCR)
    runs-on: ubuntu-latest
    needs: [quality, changelog]
    if: |
      always() &&
      needs.quality.result == 'success' &&
      needs.changelog.result == 'success' &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set image name (GHCR paths must be lowercase)
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref_type == 'branch' && (github.ref_name == 'main' || github.ref_name == 'master') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
