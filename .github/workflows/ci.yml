# Quality gate: single canonical `make verify` (deps-audit, lint, types, OpenAPI,
# contract tests, pytest + coverage floor, docs-check drift gate, docs-a11y-check).
# Local and CI workflows intentionally use the same command, so green here implies
# green pre-push.
#
# Companion jobs (docs-a11y, pr-template-check) live here too: keep all PR/push CI in one
# workflow. CD lives in `deploy-prod.yml` (prod Pages deploy on main),
# `deploy-staging.yml` (mirror Pages deploy on staging), and the
# `publish-image` job below (GHCR image push, gated on `quality` + `changelog` success).
name: CI

on:
  push:
    branches: [main, master, staging]
    tags: ["v*"]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # The changelog gate must catch missing CHANGELOG.md entries at the earliest
  # PR in the staging-flow — i.e. feature → staging, not only staging → main.
  # Otherwise the error first appears on the staging → main PR, by which point
  # the offending change is already on staging and the fix has to be either
  # back-ported into staging or applied directly to main.
  changelog:
    name: Changelog gate
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request' && (github.event.pull_request.base.ref == 'main' || github.event.pull_request.base.ref == 'master' || github.event.pull_request.base.ref == 'staging')) ||
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/staging' || startsWith(github.ref, 'refs/tags/v')))
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: PR changelog gate
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          python3 tools/governance/changelog_gate.py \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}" \
            --event pr

      - name: Push changelog gate
        if: github.event_name == 'push'
        run: |
          python3 tools/governance/changelog_gate.py \
            --base "${{ github.event.before }}" \
            --head "${{ github.event.after }}" \
            --event push

  # ADR 0028 Phase 4 — quality is fanned out across per-service matrix slots so
  # a portal-only failure does not gate the API tests (and vice-versa). The matrix
  # entries call `make -C services/<svc> verify`; the per-service Makefiles
  # delegate to root for the shared gates (ruff/mypy/pytest config still lives in
  # root pyproject.toml + .pre-commit-config.yaml until per-service pyproject
  # splits are wired up in a follow-up).
  quality:
    name: Quality gate (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            run: make -C services/api verify
          - service: portal
            run: make -C services/portal verify
          - service: monitoring
            run: |
              docker compose -f services/monitoring/docker-compose.observability.yml config --quiet
              docker compose -f services/monitoring/docker-compose.logging.yml config --quiet
          - service: cross-cutting
            run: |
              .venv/bin/python tools/governance/check_service_imports.py
              .venv/bin/python tools/governance/check_asset_refs.py
              .venv/bin/python tools/governance/check_css_vars.py || true   # pre-existing var/* drift; informational
              .venv/bin/pre-commit run --all-files
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-venv

      - name: ${{ matrix.service }}
        run: ${{ matrix.run }}

  # Smoke gate for the service folder split (ADR 0028 Phase 1 + 3):
  # ensures the root docker-compose.yml and every per-service compose can be
  # parsed and that all bind-mount paths resolve. Cheap (~5 s), catches the
  # most common path-drift class.
  compose-smoke:
    name: Compose parse smoke (root + per-service)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Root docker-compose.yml
        run: docker compose -f docker-compose.yml config --quiet

      - name: services/monitoring/docker-compose.observability.yml
        run: docker compose -f services/monitoring/docker-compose.observability.yml config --quiet

      - name: services/monitoring/docker-compose.logging.yml
        run: docker compose -f services/monitoring/docker-compose.logging.yml config --quiet

      - name: services/api/Dockerfile (BuildKit checks)
        run: docker build --check services/api

  # NOTE: the visual-regression job intentionally lives only as a local
  # developer affordance (`make visual-test` / `make visual-test-update` from
  # repo root). It is NOT wired into CI because PNG baselines bake in the
  # platform that generated them — sub-pixel AA + font hinting differ
  # between macOS Chromium (the dev machine) and Linux Chromium (the
  # GitHub runner), so a baseline that's pixel-perfect locally fails on CI
  # without any UI change. Re-introducing it requires either baseline
  # baking on the runner (workflow_dispatch job + commit-back), or
  # per-platform baselines under tests/visual/baselines/<os>/.

  pr-template-check:
    name: Validate PR change type selection
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Require delivery/docs-only/mixed checkbox
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail

          if [ -z "${PR_BODY:-}" ]; then
            echo "PR body is empty."
            echo "Please fill the PR template and select one change type: delivery, docs-only, or mixed."
            exit 1
          fi

          checked_count=0
          for marker in \
            "- [x] \`delivery\`" \
            "- [x] \`docs-only\`" \
            "- [x] \`mixed\`" \
            "- [X] \`delivery\`" \
            "- [X] \`docs-only\`" \
            "- [X] \`mixed\`"; do
            if [[ "${PR_BODY}" == *"${marker}"* ]]; then
              checked_count=$((checked_count + 1))
            fi
          done

          if [ "${checked_count}" -eq 0 ]; then
            echo "No PR change type selected."
            echo "Please check one option in 'Change type': delivery, docs-only, or mixed."
            exit 1
          fi

          if [ "${checked_count}" -gt 1 ]; then
            echo "Multiple PR change types selected."
            echo "Please select exactly one option in 'Change type': delivery, docs-only, or mixed."
            exit 1
          fi

          echo "PR template change type is valid."

  # CD: push the same Dockerfile artifact to GHCR after quality (and changelog on main/master).
  # Secrets: none beyond the default GITHUB_TOKEN (job permission packages:write). Runtime env
  # (DATABASE_URL, APP_ENV, …) belongs on the deployment host or PaaS — not in this workflow.
  # Pull: docker pull ghcr.io/<owner>/<repo>:<tag>
  publish-image:
    name: Publish container image (GHCR)
    runs-on: ubuntu-latest
    needs: [quality, changelog, compose-smoke]
    if: |
      always() &&
      needs.quality.result == 'success' &&
      needs.changelog.result == 'success' &&
      needs.compose-smoke.result == 'success' &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # Per-service image tag scheme (ADR 0028 §Phase 2 wiring): the API image lives
      # under ghcr.io/<repo>/api so future per-service images (portal, monitoring)
      # can ship at sibling paths without retagging. The legacy bare-repo tag
      # ghcr.io/<repo>:<sha> is published alongside for one release as a compatibility
      # shim; remove on the next bump.
      - name: Set image name (GHCR paths must be lowercase)
        id: image
        run: |
          base="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "name=$base/api" >> "$GITHUB_OUTPUT"
          echo "legacy=$base"   >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ steps.image.outputs.name }}
            ${{ steps.image.outputs.legacy }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref_type == 'branch' && (github.ref_name == 'main' || github.ref_name == 'master') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./services/api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
