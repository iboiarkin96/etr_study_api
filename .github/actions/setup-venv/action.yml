name: Setup venv
description: |
  Set up Python via .python-version, create .venv, install requirements.txt with pip cache.
  Precondition: actions/checkout must run before this action so .python-version and
  requirements.txt are present in the workspace.

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version-file: .python-version
        cache: pip
        cache-dependency-path: requirements.txt

    - name: Create venv and install dependencies
      shell: bash
      run: |
        python -m venv .venv
        .venv/bin/pip install --upgrade pip
        .venv/bin/pip install -r requirements.txt
