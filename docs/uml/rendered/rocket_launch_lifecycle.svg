<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="515px" preserveAspectRatio="none" style="width:558px;height:515px;background:#FFFFFF;" version="1.1" viewBox="0 0 558 515" width="558px" zoomAndPan="magnify"><title>Docs frontend &#8212; Rocket launch lifecycle</title><defs/><g><g class="title" data-source-line="44"><text fill="#000000" font-family="'Arial'" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="316.8389" x="113.9462" y="26.9951">Docs frontend &#8212; Rocket launch lifecycle</text></g><g><rect fill="#F1F1F1" height="70.9219" rx="3" ry="3" style="stroke:#181818;stroke-width:0.5;" width="157.8486" x="216.96" y="350.9869"/><line style="stroke:#181818;stroke-width:0.5;" x1="216.96" x2="374.8086" y1="380.6275" y2="380.6275"/><text fill="#000000" font-family="'Arial'" font-size="10" lengthAdjust="spacing" textLength="18.2275" x="286.7705" y="369.2691">Idle</text><text fill="#000000" font-family="'Arial'" font-size="10" lengthAdjust="spacing" textLength="116.7725" x="225.96" y="398.9097">FAB hidden or compact</text><text fill="#000000" font-family="'Arial'" font-size="10" lengthAdjust="spacing" textLength="129.8486" x="225.96" y="410.5504">(no canvas, no transform)</text></g><g><rect fill="#F1F1F1" height="70.9219" rx="3" ry="3" style="stroke:#181818;stroke-width:0.5;" width="141.5156" x="225.12" y="438.9069"/><line style="stroke:#181818;stroke-width:0.5;" x1="225.12" x2="366.6356" y1="468.5475" y2="468.5475"/><text fill="#000000" font-family="'Arial'" font-size="10" lengthAdjust="spacing" textLength="33.1934" x="279.2811" y="457.1891">Armed</text><text fill="#000000" font-family="'Arial'" font-size="10" lengthAdjust="spacing" textLength="90.2246" x="234.12" y="486.8297">FAB pill expanded</text><text fill="#000000" font-family="'Arial'" font-size="10" lengthAdjust="spacing" textLength="113.5156" x="234.12" y="498.4704">rocket ico