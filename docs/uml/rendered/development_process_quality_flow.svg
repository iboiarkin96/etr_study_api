xt><polygon fill="#F1F1F1" points="431.8264,1084.4073,455.397,1107.9778,431.8264,1131.5484,408.2558,1107.9778,431.8264,1084.4073" style="stroke:#181818;stroke-width:0.9821;"/><rect fill="#F1F1F1" height="85.7195" rx="7.8569" ry="7.8569" style="stroke:#181818;stroke-width:0.9821;" width="251.2103" x="306.2212" y="1170.8327"/><text fill="#000000" font-family="'Arial'" font-size="19.6421" lengthAdjust="spacing" textLength="188.3555" x="337.6487" y="1220.4924">4) Open/Update PR</text><rect fill="#E8F5E9" height="108.5842" rx="7.8569" ry="7.8569" style="stroke:#181818;stroke-width:0.9821;" width="486.5419" x="188.5554" y="1295.8365"/><text fill="#000000" font-family="'Arial'" font-size="19.6421" lengthAdjust="spacing" textLength="114.8413" x="219.9829" y="1345.4962">Helper in CI</text><text fill="#000000" font-family="'Arial'" font-size="19.6421" lengthAdjust="spacing" textLength="423.6871" x="219.9829" y="1368.3609">`.github/workflows/pr-template-check.yml`</text><rect fill="#F1F1F1" height="108.5842" rx="7.8569" ry="7.8569" style="stroke:#181818;stroke-width:0.9821;" width="266.6133" x="298.5198" y="1443.705"/><text fill="#000000" font-family="'Arial'" font-size="19.6421" lengthAdjust="spacing" textLength="169.8834" x="329.9472" y="1493.3647">5) CI quality gate</text><text fill="#000000" font-family="'Arial'" font-size="19.6421" lengthAdjust="spacing" textLength="203.7584" x="329.9472" y="1516.2293">(full pipeline checks)</text><polygon fill="#F1F1F1" points="373.3719,1591.5734,490.281,1591.5734,513.8515,1615.144,490.281,1638.7146,373.3719,1638.7146,349.8013,1615.144,373.3719,1591.5734" style="stroke:#181818;stroke-width:0.9821;"/><text fill="#000000" font-family="'Arial'" font-size="19.6421" lengthAdjust="spacing" textLength="93.3385" x="385.1571" y="1621.944">CI green?</text><text fill="#000000" font-family="'Arial'" font-size="17.6779" lengthAdjust="spacing" textLength="30.5479" x="307.4681" y="1599.1896">yes</text><text fill="#000000" font-family="'Arial'" font-siz