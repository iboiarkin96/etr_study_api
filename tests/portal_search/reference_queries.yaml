# Reference queries for portal search evaluation (BL-064).
#
# Used by scripts/search_eval.py (W3+) as a CI gate when changes touch
# search* components or scripts/build_pagefind_index.sh.
#
# All queries are English — the portal is English-only (decision logged in
# memory/feedback_adr_outdated_over_new.md sibling note 2026-06-06).
#
# Gates (W3 acceptance):
#   top_1                 >= 18/20
#   top_3 superset match  >= 17/20
#
# Each entry:
#   query              — what the user types
#   expected_top_1     — URL prefix (suffix-matched against pagefind result URL)
#   expected_in_top_3  — set of URL prefixes; at least one must appear in top-3

queries:
  - query: "idempotency"
    expected_top_1: "/internal/governance/adr/0006-idempotency-write-operations"
    expected_in_top_3:
      - "/internal/governance/adr/0006-idempotency-write-operations"

  - query: "openapi versioning"
