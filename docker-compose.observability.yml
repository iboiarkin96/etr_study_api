services:
  blackbox:
    image: prom/blackbox-exporter:latest
    container_name: study-app-blackbox
    command:
      - "--config.file=/config/blackbox.yml"
    volumes:
      - ./ops/prometheus/blackbox.yml:/config/blackbox.yml:ro
    ports:
      - "${BLACKBOX_EXPORTER_PORT:-9115}:9115"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: study-app-prometheus
    depends_on:
      - blackbox
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: study-app-grafana
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
