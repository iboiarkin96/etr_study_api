[alembic]
script_location = alembic
prepend_sys_path = .
# Overridden at runtime by services/api/alembic/env.py via settings.sqlite_url
# (repo-root anchored). This default is kept for offline alembic CLI invocations only.
sqlalchemy.url = sqlite:///../../var/api/study_app.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
