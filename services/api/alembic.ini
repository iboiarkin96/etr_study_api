[alembic]
script_location = alembic
prepend_sys_path = .
# Overridden at runtime by services/api/alembic/env.py via settings.database_url
# (ADR 0037). This default is kept for offline alembic CLI invocations only —
# real runs go through env.py, which reads DATABASE_URL.
sqlalchemy.url = postgresql+psycopg://study_app:study_app@127.0.0.1:5432/study_app

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
