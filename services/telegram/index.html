<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f0f10" />
    <title>Study App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..900&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <!--
      Telegram Mini App SDK — injects `window.Telegram.WebApp` with real
      initData, HapticFeedback, BackButton, MainButton, CloudStorage, etc.
      MUST load BEFORE our JS bundle so `installTelegramMock()` in main.tsx
      sees a real WebApp (`initData !== ''` inside real Telegram) and skips
      the shim. Without this script `window.Telegram` never gets injected —
      our mock takes over and every haptic/back-button/etc. call becomes a
      no-op. On-device symptom: /debug/haptics shows «platform: weba,
      initData: missing» even inside Telegram, and no vibration fires.
    -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
