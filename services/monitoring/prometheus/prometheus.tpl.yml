global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/study_app_slo.yml

scrape_configs:
  - job_name: "study-app-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["${PROMETHEUS_SCRAPE_TARGET}"]

  - job_name: "study-app-blackbox"
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - "${PROMETHEUS_READY_PROBE_URL}"
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115
