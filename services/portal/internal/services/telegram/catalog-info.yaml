x-study-app:
  tone: accent
  display-order: 25
  lede: >-
    React + TypeScript client that launches from Telegram as a WebApp and
    covers the ETR daily loop — Today · Focus · Conspectus · Schedule ·
    Errors. Multi-user by design; auth is Telegram <code>initData</code>
    verified server-side, then a 24 h JWT signed with <code>JWT_SECRET</code>.
  tile-lede: >-
    React + TS client that launches from Telegram as a WebApp — the ETR
    daily loop in nine screens.
  tile-stack: "React 18 · TypeScript · Vite 6 · @telegram-apps/sdk-react"
  header-pills:
    - { text: React 18, tone: info }
    - { text: TypeScript, tone: neutral }
    - { text: Vite 6, tone: neutral }
    - { text: multi-user, tone: info }
  source-display: services/telegram/
