# Shared error-envelope schema (per ADR-0003).
# Every documented 4xx/5xx response uses this shape via $ref.
type: object
required: [code, message]
properties:
  code:
    type: string
    description: Machine-readable error code (snake_case, stable across releases).
    examples: [validation_error, conflict, not_found]
  message:
    type: string
    description: Human-readable explanation. Locale-agnostic.
