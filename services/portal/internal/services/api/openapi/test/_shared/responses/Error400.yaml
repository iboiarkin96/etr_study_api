# Shared 400 Bad Request response (per ADR-0003).
#
# Use when a generic «request failed schema validation» example is enough.
# When the operation has specific validation rules worth surfacing — pinned
# fields, conditional requirements — DO NOT $ref this response. Inline the
# response inside the fragment and ship per-operation examples that reference
# the actual field names. See:
#   services/portal/internal/services/api/reference/openapi-fragment-anatomy.html
#     · § «Shared vs. per-operation response examples»
description: Bad Request — the request body or parameters failed schema validation.
content:
  application/json:
    schema:
      $ref: "../schemas/ErrorBody.yaml"
    examples:
      generic:
        summary: Validation error
        value:
          code: validation_error
          message: "Request did not match the operation's schema."
