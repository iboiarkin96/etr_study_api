# Shared 409 Conflict response (per ADR-0003).
#
# Use when a generic conflict example is enough. When the operation has a
# specific uniqueness invariant worth surfacing (resource name, slug, etc.)
# DO NOT $ref this response. Inline the response inside the fragment and ship
# per-operation examples that reference the actual field. See:
#   services/portal/internal/services/api/reference/openapi-fragment-anatomy.html
#     · § «Shared vs. per-operation response examples»
description: Conflict — the request conflicts with the current state of the resource.
content:
  application/json:
    schema:
      $ref: "../schemas/ErrorBody.yaml"
    examples:
      generic:
        summary: State conflict
        value:
          code: conflict
          message: "Operation conflicts with the current state of the resource."
      idempotency_replay_mismatch:
        summary: Idempotency-Key replay with a different payload
        value:
          code: idempotency_replay_mismatch
          message: "Idempotency-Key has been seen with a different payload."
