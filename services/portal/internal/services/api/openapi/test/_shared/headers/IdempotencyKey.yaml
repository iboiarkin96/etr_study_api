# Shared Idempotency-Key header (per ADR-0006).
# Required on every write operation; the server replays the cached response
# within the idempotency window when the same key is reused.
name: Idempotency-Key
in: header
required: true
description: >
  Caller-supplied opaque key (UUIDv4 recommended).
schema:
  type: string
  minLength: 8
  maxLength: 128
  pattern: "^[A-Za-z0-9_-]+$"
example: "8f5a2c19-3b4e-4d8a-9f3b-1c2d3e4f5a6b"
