# Per-resource 409 — another user already owns the supplied email.
#
# Shape: full Response Object. Schema reuses the shared error envelope;
# examples name user-specific fields (email). Reused by every user write
# operation that enforces email uniqueness — currently PUT updateUserTest,
# future createUser / patchUser.
#
# $ref depth: ../../../_shared/... (three levels up to openapi/).
description: Conflict — another user already owns this email address.
content:
  application/json:
    schema: { $ref: "../../../_shared/schemas/ErrorBody.yaml" }
    examples:
      email_already_taken:
        summary: Email already taken by another user
        value:
          code: user_email_already_taken
          message: "Email 'renamed@example.com' is already in use by another user."
      idempotency_replay_mismatch:
        summary: Idempotency-Key replayed with a different user payload
        value:
          code: idempotency_replay_mismatch
          message: "Idempotency-Key has been seen with a different user payload."
