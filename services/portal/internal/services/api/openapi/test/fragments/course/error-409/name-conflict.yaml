# Per-resource 409 — «course with this name already exists».
#
# Shape: full Response Object (description + content). Schema is the shared
# error envelope; examples reference course-specific fields (name) and are
# expected to be reused by any course write operation that enforces name
# uniqueness — currently POST createCourse, future PATCH/PUT updateCourse.
#
# When a new course operation has a 409 case that this file does NOT cover,
# add a sibling here (e.g. slug-conflict.yaml) rather than expanding this one;
# one file per distinct conflict class keeps the per-operation $ref accurate.
description: Conflict — a course with this name already exists.
content:
  application/json:
    schema:
      $ref: "../../../_shared/schemas/ErrorBody.yaml"
    examples:
      name_already_exists:
        summary: A course with this name already exists
        value:
          code: course_name_already_exists
          message: "A course named 'Introduction to Python' already exists."
      idempotency_replay_mismatch:
        summary: Idempotency-Key replayed with a different course payload
        value:
          code: idempotency_replay_mismatch
          message: "Idempotency-Key has been seen with a different course payload."
