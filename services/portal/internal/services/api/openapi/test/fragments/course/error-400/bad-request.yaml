# Per-resource 400 — request body failed schema validation.
#
# Shape: full Response Object (description + content). Schema reuses the
# shared error envelope; examples name course-specific fields (name, length).
# Reused by every course write operation that does Pydantic-style validation
# on the same fields — currently POST createCourse.
#
# $ref depth: this file is at fragments/course/error-400/, three levels above
# the openapi/_shared/ root — ../../../_shared/... (note three ../).
description: Bad Request — request body failed schema validation.
content:
  application/json:
    schema: { $ref: "../../../_shared/schemas/ErrorBody.yaml" }
    examples:
      missing_name:
        summary: "name is missing"
        value:
          code: validation_error
          message: "Field 'name' must not be empty."
      name_too_long:
        summary: "name exceeds maxLength 80"
        value:
          code: validation_error
          message: "Field 'name' must be 80 characters or fewer."
      length_out_of_range:
        summary: "length not in [1..1000]"
        value:
          code: validation_error
          message: "Field 'length' must be between 1 and 1000."
