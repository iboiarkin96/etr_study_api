# Per-resource 400 — request body failed schema validation on the User resource.
#
# Shape: full Response Object (description + content). Schema reuses the
# shared error envelope; examples name user-specific fields (name, email).
# Reused by every user write operation that does the same body validation —
# currently PUT updateUserTest.
#
# $ref depth: this file is at fragments/user/error-400/, three levels above
# the openapi/_shared/ root — ../../../_shared/... (note three ../).
description: Bad Request — request body failed schema validation.
content:
  application/json:
    schema: { $ref: "../../../_shared/schemas/ErrorBody.yaml" }
    examples:
      missing_name:
        summary: "name is missing"
        value:
          code: validation_error
          message: "Field 'name' must not be empty."
      missing_email:
        summary: "email is missing"
        value:
          code: validation_error
          message: "Field 'email' must not be empty."
      invalid_email_format:
        summary: "email is not a valid address"
        value:
          code: validation_error
          message: "Field 'email' must be a valid email address."
      name_too_long:
        summary: "name exceeds maxLength 80"
        value:
          code: validation_error
          message: "Field 'name' must be 80 characters or fewer."
