openapi: 3.1.0
info:
  title: Study App API
  version: v1
paths:
  /api/v1/courses/test:
    get:
      operationId: getCourse
      summary: Look up a course by name.
      description: |
        Returns the course whose `name` exactly matches the query parameter.
        Course names are unique across the resource, so at most one course
        is returned.
      tags: [All courses]
      parameters:
        - name: name
          in: query
          required: true
          description: >
            Course name to look up. Match is exact and case-sensitive.
            Constrained to the same 1..80-char range.
          schema:
            type: string
            minLength: 1
            maxLength: 80
          example: "Introduction to Python"
      responses:
        "200":
          description: OK — the course with the matching name.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Course" }
              examples:
                default:
                  summary: A course with a short beginner track
                  value:
                    name: "Introduction to Python"
                    length: 10
components:
  schemas:
    Course:
      type: object
      required: [name, length]
      properties:
        name: { type: string, minLength: 1, maxLength: 80 }
        length: { type: integer, minimum: 1, maximum: 1000 }
