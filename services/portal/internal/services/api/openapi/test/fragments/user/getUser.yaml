openapi: 3.1.0
info:
  title: Study App API
  version: v1
paths:
  /api/v1/users/test:
    get:
      operationId: getUser
      summary: Look up a user by email.
      description: |
        Returns the user whose email exactly matches the query parameter.
        Email uniqueness is enforced across the User resource, so at most
        one user is returned. Returns `404 Not Found` when no user matches.
      tags: [User]
      parameters:
        - name: email
          in: query
          required: true
          description: >
            User email address
          schema:
            type: string
            format: email
            maxLength: 254
          example: "test@example.com"
      responses:
        "200":
          description: OK — the user with the matching email.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
              examples:
                default:
                  summary: A user matching the queried email
                  value:
                    id: u_a1b2c3d4
                    name: "Alice Example"
                    email: "alice@example.com"
components:
  schemas:
    User:
      type: object
      required: [id, name, email]
      properties:
        id: { type: string, pattern: "^u_[a-z0-9]+$" }
        name: { type: string, minLength: 1, maxLength: 80 }
        email: { type: string, format: email, maxLength: 254 }
