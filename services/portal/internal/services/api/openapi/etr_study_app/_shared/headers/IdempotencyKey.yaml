# Idempotency-Key header — required on every write operation.
#
# The server caches the response keyed by (client_uuid, endpoint, key). A
# repeated request within the idempotency window (24 h) with the same key
# replays the cached response. A repeated request with the same key but a
# different payload returns 409 Conflict.
#
# Mirrors app.core.idempotency validation rules.
name: Idempotency-Key
in: header
required: true
description: >
  Caller-supplied opaque key (UUIDv4 recommended). Replays the cached response
  for the configured idempotency window (24 h). Reuse with a different payload
  raises 409 Conflict.
schema:
  type: string
  minLength: 8
  maxLength: 128
  pattern: "^[A-Za-z0-9_-]+$"
example: "create-user-2026-07-05-01"
