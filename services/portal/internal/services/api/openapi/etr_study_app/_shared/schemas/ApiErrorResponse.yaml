# Standard error envelope for 4xx/5xx business + security failures.
# Mirrors app.schemas.errors.ApiErrorResponse.
#
# Every field is required. `code` is the stable project-wide identifier
# (e.g. USER_001, IDEMP_002). `key` is the machine-readable duplicate for
# clients that prefer strings over numeric codes. `source` says which layer
# raised the error (business | security | infra).
type: object
required: [code, key, message, source]
properties:
  code:
    type: string
    description: Project-wide stable error code.
    example: "USER_001"
  key:
    type: string
    description: Machine-readable key for clients.
    example: "user_already_exists"
  message:
    type: string
    description: Human-readable English message.
    example: "User with system_user_id='134tg' and system_uuid='b2c3d4e5-…' already exists."
  source:
    type: string
    enum: [business, security, infra]
    description: Origin layer that raised the error.
    example: "business"
