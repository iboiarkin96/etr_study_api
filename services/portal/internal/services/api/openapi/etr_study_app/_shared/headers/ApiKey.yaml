# X-API-Key header — required on every protected route.
#
# Identifies the calling tenant. Mirrors app.api.v1.user.api_key_security
# (APIKeyHeader with auto_error=False; the guard runs in the security layer).
name: X-API-Key
in: header
required: true
description: >
  Tenant API key. Identifies the calling integrator. Rejected with 401
  when missing or unknown. Rate limits (429) are applied per key.
schema:
  type: string
  minLength: 16
  maxLength: 256
example: "sk_test_49d1f7a2b98c4c31af8e6b2b0c9b4d31"
