# Shared 429 — per-key rate limit exceeded.
# Common to every protected route.
description: Too Many Requests — per-key rate limit exceeded.
content:
  application/json:
    schema:
      $ref: "../schemas/ApiErrorResponse.yaml"
    examples:
      rate_limited:
        summary: Rate limit exceeded
        value:
          code: "SEC_020"
          key: "rate_limit_exceeded"
          message: "Rate limit exceeded for this API key. Retry after the Retry-After header."
          source: "security"
