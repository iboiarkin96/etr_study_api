# Shared 413 — request body exceeds the configured maximum size.
# Common to every write route.
description: Payload Too Large — request body exceeds the configured limit.
content:
  application/json:
    schema:
      $ref: "../schemas/ApiErrorResponse.yaml"
    examples:
      body_too_large:
        summary: Body size limit exceeded
        value:
          code: "SEC_010"
          key: "body_too_large"
          message: "Request body is larger than the configured limit (1 MB)."
          source: "security"
