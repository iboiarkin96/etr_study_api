# Shared 422 — Pydantic/FastAPI validation failures.
#
# Do NOT $ref this response when the operation has domain-specific validation
# messages worth surfacing (e.g. per-field examples for `createUser`). For
# those cases, inline the response inside the fragment and reuse the schema
# via $ref to ValidationErrorResponse.yaml only.
description: Unprocessable Content — one or more request fields failed validation.
content:
  application/json:
    schema:
      $ref: "../schemas/ValidationErrorResponse.yaml"
    examples:
      generic:
        summary: Generic validation failure envelope
        value:
          error_type: "validation_error"
          endpoint: "POST /api/v1/{resource}"
          errors:
            - code: "GEN_001"
              key: "field_invalid"
              message: "Request did not match the operation's schema."
              source: "validation"
