# One entry in the `errors` array of a 422 response.
# Mirrors app.schemas.errors.ValidationErrorItem.
type: object
required: [code, key, message, source]
properties:
  code:
    type: string
    description: Stable validation error code (e.g. `USER_001`).
    example: "USER_001"
  key:
    type: string
    description: Machine-readable key for clients.
    example: "system_user_id_length"
  message:
    type: string
    description: Human-readable message for this specific failure.
    example: "system_user_id must be between 1 and 36 characters."
  field:
    type: string
    nullable: true
    description: JSON field name when applicable.
    example: "system_user_id"
  source:
    type: string
    enum: [validation]
    description: Always `validation` for this model.
    example: "validation"
  details:
    type: object
    nullable: true
    additionalProperties: true
    description: Raw Pydantic context (loc, type, input, etc.).
    example:
      loc: ["body", "system_user_id"]
      type: "string_too_long"
      input: "very-long-input-…"
