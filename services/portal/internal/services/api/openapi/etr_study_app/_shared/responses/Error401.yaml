# Shared 401 — X-API-Key missing or unknown.
# Common to every protected route.
description: Unauthorized — X-API-Key missing or unknown.
content:
  application/json:
    schema:
      $ref: "../schemas/ApiErrorResponse.yaml"
    examples:
      missing_api_key:
        summary: X-API-Key header missing
        value:
          code: "AUTH_001"
          key: "api_key_missing"
          message: "X-API-Key header is required."
          source: "security"
      unknown_api_key:
        summary: X-API-Key not recognised
        value:
          code: "AUTH_002"
          key: "api_key_unknown"
          message: "X-API-Key is not recognised."
          source: "security"
