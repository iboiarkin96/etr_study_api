# Top-level body for HTTP 422 validation failures.
# Mirrors app.schemas.errors.ValidationErrorResponse.
type: object
required: [error_type, endpoint, errors]
properties:
  error_type:
    type: string
    enum: [validation_error]
    description: Fixed discriminator identifying the envelope shape.
    example: "validation_error"
  endpoint:
    type: string
    description: "`METHOD path` string for the failing request."
    example: "POST /api/v1/user"
  errors:
    type: array
    minItems: 1
    items:
      $ref: "./ValidationErrorItem.yaml"
