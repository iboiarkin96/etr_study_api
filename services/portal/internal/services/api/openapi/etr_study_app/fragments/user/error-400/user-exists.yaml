# Per-resource 400 — business-rule failure on User creation.
#
# `createUser` returns 400 when the composite natural key
# `(system_user_id, system_uuid)` already identifies a User row for the
# calling tenant. This is a business error, not a schema violation
# (which would be 422). Same envelope, different code/key.
description: Bad Request — business-rule failure on User creation.
content:
  application/json:
    schema:
      $ref: "../../../_shared/schemas/ApiErrorResponse.yaml"
    examples:
      user_exists:
        summary: User with this natural key already exists
        value:
          code: "USER_001"
          key: "user_already_exists"
          message: "User with system_user_id='134tg' and system_uuid='b2c3d4e5-0002-4000-8000-000000000002' already exists."
          source: "business"
      invalid_invalidation_reason:
        summary: invalidation_reason_uuid does not resolve to a known reason
        value:
          code: "USER_002"
          key: "invalidation_reason_unknown"
          message: "invalidation_reason_uuid does not resolve to a known reason row."
          source: "business"
