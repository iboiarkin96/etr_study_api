openapi: 3.1.0
info:
  title: Study App API · etr_study_app canon
  version: v1
  x-build-history: canon-first
  x-portal-spec: /services/portal/internal/services/api/reference/me/operations/get-api-v1-me-achievements.html
paths:
  /api/v1/me/achievements:
    get:
      operationId: getMeAchievements
      x-implementation-status: implemented
      summary: Achievement set computed from the learner's own data.
      description: |
        Returns the learner's achievement set as chips for the Profile screen.
        Every item is derived on read from `conspectus_review_logs`,
        `conspectuses`, and `learning_errors` — no unlock rows are persisted,
        so the set is always consistent with the underlying data (wiping a
        dev account also drops its badges).

        Keys are a closed, additive-only set the client maps to icon + copy:
        `first_review`, `streak_7`, `streak_30`, `reviews_100`, `notes_10`,
        `noticer_10`, `perfect_day`, `comeback`, `early_bird`, `night_owl`,
        `mastery_50`, `reviews_500`. Streak achievements use the LONGEST
        streak, so a badge does not un-earn itself when the current streak
        breaks. Binary badges report `target: 1` with `progress: 0` or `1`
        so every item shares the same shape. `progress` is clamped to
        `target`. Clients must ignore unknown keys.

        Read-only; no `Idempotency-Key`. Requires `X-API-Key`. Each call
        recomputes — no caching in v1.
      tags: [Me]
      parameters:
        - $ref: "../../_shared/headers/ApiKey.yaml"
        - name: system_user_id
          in: query
          required: true
          description: External user id (composite key with `system_uuid`).
          schema:
            type: string
            minLength: 1
            maxLength: 36
          example: "learner-01"
        - name: system_uuid
          in: query
          required: true
          description: Source system UUID (composite key with `system_user_id`).
          schema:
            type: string
            format: uuid
          example: "b2c3d4e5-0002-4000-8000-000000000002"
      responses:
        "200":
          description: OK — achievement chips computed as of `computed_at`.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MeAchievementsResponse" }
              examples:
                early_learner:
                  summary: First review earned, streak badges still locked
                  value:
                    items:
                      - { key: "first_review", unlocked: true,  progress: 1,  target: 1 }
                      - { key: "streak_7",     unlocked: false, progress: 2,  target: 7 }
                      - { key: "streak_30",    unlocked: false, progress: 2,  target: 30 }
                      - { key: "reviews_100",  unlocked: false, progress: 3,  target: 100 }
                      - { key: "notes_10",     unlocked: false, progress: 1,  target: 10 }
                      - { key: "noticer_10",   unlocked: false, progress: 0,  target: 10 }
                      - { key: "perfect_day",  unlocked: false, progress: 0,  target: 1 }
                      - { key: "comeback",     unlocked: false, progress: 0,  target: 1 }
                      - { key: "early_bird",   unlocked: false, progress: 0,  target: 1 }
                      - { key: "night_owl",    unlocked: false, progress: 0,  target: 1 }
                      - { key: "mastery_50",   unlocked: false, progress: 1,  target: 50 }
                      - { key: "reviews_500",  unlocked: false, progress: 3,  target: 500 }
                    computed_at: "2026-07-22T09:00:00+00:00"
                fresh_learner:
                  summary: Brand-new account, nothing unlocked
                  value:
                    items:
                      - { key: "first_review", unlocked: false, progress: 0,  target: 1 }
                      - { key: "streak_7",     unlocked: false, progress: 0,  target: 7 }
                      - { key: "streak_30",    unlocked: false, progress: 0,  target: 30 }
                      - { key: "reviews_100",  unlocked: false, progress: 0,  target: 100 }
                      - { key: "notes_10",     unlocked: false, progress: 0,  target: 10 }
                      - { key: "noticer_10",   unlocked: false, progress: 0,  target: 10 }
                      - { key: "perfect_day",  unlocked: false, progress: 0,  target: 1 }
                      - { key: "comeback",     unlocked: false, progress: 0,  target: 1 }
                      - { key: "early_bird",   unlocked: false, progress: 0,  target: 1 }
                      - { key: "night_owl",    unlocked: false, progress: 0,  target: 1 }
                      - { key: "mastery_50",   unlocked: false, progress: 0,  target: 50 }
                      - { key: "reviews_500",  unlocked: false, progress: 0,  target: 500 }
                    computed_at: "2026-07-22T09:00:00+00:00"
        "401": { $ref: "../../_shared/responses/Error401.yaml" }
        "404":
          description: Not Found — the user does not exist for this tenant.
          content:
            application/json:
              schema: { $ref: "../../_shared/schemas/ApiErrorResponse.yaml" }
              examples:
                user_not_found:
                  summary: No user matches the composite key
                  value:
                    code: "USER_404"
                    key: "USER_NOT_FOUND"
                    message: "User with this `system_user_id` and `system_uuid` was not found."
                    source: "business"
        "422":
          description: Unprocessable Content — query parameters failed validation.
          content:
            application/json:
              schema: { $ref: "../../_shared/schemas/ValidationErrorResponse.yaml" }
              examples:
                missing_system_uuid:
                  summary: "`system_uuid` is required"
                  value:
                    error_type: "validation_error"
                    endpoint: "GET /api/v1/me/achievements"
                    errors:
                      - code: "COMMON_000"
                        key: "COMMON_VALIDATION_ERROR"
                        message: "Query parameter `system_uuid` is required."
                        field: "system_uuid"
                        source: "validation"
        "429": { $ref: "../../_shared/responses/Error429.yaml" }
components:
  schemas:
    MeAchievementsResponse:
      type: object
      required: [items, computed_at]
      properties:
        items:
          type: array
          description: "All twelve achievement chips in fixed order (see portal spec §4)."
          items: { $ref: "#/components/schemas/Achievement" }
        computed_at:
          type: string
          format: date-time
          description: "Server timestamp when the achievement set was computed (RFC 3339, UTC)."
    Achievement:
      type: object
      required: [key, unlocked, progress, target]
      properties:
        key:
          type: string
          description: "Stable identifier the client maps to icon + copy (additive-only enum)."
          example: "streak_7"
        unlocked:
          type: boolean
          description: "True once `progress` reached `target`."
        progress:
          type: integer
          minimum: 0
          description: "Current progress toward `target`; clamped to `target`."
        target:
          type: integer
          minimum: 1
          description: "Threshold that unlocks the achievement (binary badges use 1)."
