openapi: 3.1.0
info:
  title: Study App API · etr_study_app canon
  version: v1
  # ADR 0036 D6 — back-fill of a code-first FastAPI handler.
  x-build-history: code-first
  x-portal-spec: /services/portal/internal/services/api/reference/user/operations/patch-api-v1-user-system_uuid-system_user_id.html
paths:
  /api/v1/user/{system_uuid}/{system_user_id}:
    patch:
      operationId: patchUserBySystemUserId
      summary: Partial update of user profile fields.
      description: |
        Updates only the fields present in the JSON body; omitted fields
        stay unchanged. The body must include at least one property —
        an empty object returns 400 with `USER_102 · USER_PATCH_BODY_EMPTY`.
        Extra properties are rejected (schema `additionalProperties: false`,
        mirrors `model_config = ConfigDict(extra="forbid")`).

        Requires `X-API-Key` (tenant auth) and `Idempotency-Key` (write
        deduplication). A repeated request with the same key within the
        24 h window replays the cached response; a repeated request with
        the same key but a different payload returns 409 Conflict.

        Use `PUT` for a full replacement of mutable fields — see
        [`updateUserBySystemUserId`](./updateUserBySystemUserId.yaml).
      tags: [User]
      parameters:
        - $ref: "../../_shared/headers/ApiKey.yaml"
        - $ref: "../../_shared/headers/IdempotencyKey.yaml"
        - name: system_uuid
          in: path
          required: true
          description: Source system UUID (`systems.system_uuid`).
          schema:
            type: string
            format: uuid
          example: "b2c3d4e5-0002-4000-8000-000000000002"
        - name: system_user_id
          in: path
          required: true
          description: External user id in the source system.
          schema:
            type: string
            minLength: 1
            maxLength: 36
          example: "134tg"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UserPatchRequest" }
            examples:
              rename:
                summary: Change display name only
                value:
                  full_name: "Maria Petrova"
              change_timezone:
                summary: Change timezone only
                value:
                  timezone: "Europe/Berlin"
              clear_username:
                summary: Clear the username
                value:
                  username: null
              soft_invalidate:
                summary: Mark row invalid with a reason
                value:
                  is_row_invalid: 1
                  invalidation_reason_uuid: "a3f19b04-2b2a-4a55-9b70-9b4f4a0f8f01"
      responses:
        "200":
          description: OK — the persisted user after patch.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserCreateResponse" }
              examples:
                default:
                  summary: Patched user (renamed)
                  value:
                    client_uuid: "0f14a2e8-0a01-4a1e-9f7c-3f6b1c7e0d21"
                    created_at: "2026-07-05T09:15:00+00:00"
                    updated_at: "2026-07-09T11:42:11+00:00"
                    is_row_invalid: 0
                    invalidation_reason_uuid: null
                    system_user_id: "134tg"
                    system_uuid: "b2c3d4e5-0002-4000-8000-000000000002"
                    username: "ipetrov"
                    full_name: "Maria Petrova"
                    timezone: "Europe/Moscow"
        # 400 covers business-level rejects (empty body). Envelope-only; not
        # extracted to shared responses because per-op examples are the value.
        "400":
          description: Bad Request — business-rule failure on User patch.
          content:
            application/json:
              schema:
                $ref: "../../_shared/schemas/ApiErrorResponse.yaml"
              examples:
                patch_body_empty:
                  summary: No fields to patch
                  value:
                    code: "USER_102"
                    key: "USER_PATCH_BODY_EMPTY"
                    message: "PATCH body must include at least one field to update."
                    source: "business"
        "401": { $ref: "../../_shared/responses/Error401.yaml" }
        "404": { $ref: "./error-404/user-not-found.yaml" }
        "409": { $ref: "./error-409/idempotency-replay.yaml" }
        "413": { $ref: "../../_shared/responses/Error413.yaml" }
        # Inlined so examples name the actual PATCH body fields; envelope
        # schema is shared. Mirrors USER_PATCH_VALIDATION_ERROR_EXAMPLES.
        "422":
          description: Unprocessable Content — one or more request fields failed validation.
          content:
            application/json:
              schema: { $ref: "../../_shared/schemas/ValidationErrorResponse.yaml" }
              examples:
                invalid_timezone:
                  summary: Invalid timezone name (patch)
                  value:
                    error_type: "validation_error"
                    endpoint: "PATCH /api/v1/user/b2c3d4e5-0002-4000-8000-000000000002/134tg"
                    errors:
                      - code: "USER_018"
                        key: "USER_UPDATE_TIMEZONE_INVALID"
                        message: "Field `timezone` must be a valid IANA timezone."
                        field: "timezone"
                        source: "validation"
                        details:
                          type: "value_error"
                          loc: ["body", "timezone"]
                          input: "Europe/Mscow"
                          ctx: { error: {} }
        "429": { $ref: "../../_shared/responses/Error429.yaml" }
components:
  schemas:
    UserPatchRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      description: >
        Partial update payload. Every field is optional; at least one field
        must be present (`minProperties: 1`). Extra properties are rejected
        (`additionalProperties: false`, mirrors `extra="forbid"`).
      properties:
        full_name:
          type: [string, "null"]
          minLength: 1
          maxLength: 255
          description: "Full name; omit to leave unchanged."
          example: "Maria Petrova"
        timezone:
          type: [string, "null"]
          minLength: 1
          maxLength: 64
          description: "IANA timezone; omit to leave unchanged."
          example: "Europe/Berlin"
        username:
          type: [string, "null"]
          maxLength: 255
          description: "Username or login; set null to clear."
          example: null
        system_uuid:
          type: [string, "null"]
          format: uuid
          description: "Related system UUID; set null to clear."
          example: "b2c3d4e5-0002-4000-8000-000000000002"
        invalidation_reason_uuid:
          type: [string, "null"]
          format: uuid
          description: "Invalidation reason UUID; set null to clear."
          example: null
        is_row_invalid:
          type: [integer, "null"]
          enum: [0, 1, null]
          description: "Soft-invalidation flag (0 = active, 1 = invalidated)."

    UserCreateResponse:
      type: object
      required:
        - client_uuid
        - created_at
        - updated_at
        - is_row_invalid
        - full_name
        - timezone
      properties:
        client_uuid:
          type: string
          format: uuid
          description: "Server-generated internal identifier; stable across the user's lifetime."
          example: "0f14a2e8-0a01-4a1e-9f7c-3f6b1c7e0d21"
        created_at:
          type: string
          format: date-time
          description: "Row creation timestamp (timezone-aware, RFC 3339)."
          example: "2026-07-05T09:15:00+00:00"
        updated_at:
          type: string
          format: date-time
          description: "Last update timestamp (timezone-aware, RFC 3339)."
          example: "2026-07-09T11:42:11+00:00"
        is_row_invalid:
          type: integer
          enum: [0, 1]
          description: "Soft-invalidation flag (0 = active, 1 = invalidated)."
        invalidation_reason_uuid:
          type: [string, "null"]
          format: uuid
          description: "FK to invalidation reason, if set."
        system_user_id:
          type: [string, "null"]
          description: "External system user id."
        system_uuid:
          type: [string, "null"]
          format: uuid
          description: "Related system UUID."
        username:
          type: [string, "null"]
          description: "Optional display username."
        full_name:
          type: string
          description: "Full name of the user."
        timezone:
          type: string
          description: "IANA timezone string stored for the user."
