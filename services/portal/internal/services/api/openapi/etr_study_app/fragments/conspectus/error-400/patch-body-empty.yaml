# Per-resource 400 — PATCH body has no field the server can update.
#
# `patchConspectus` requires at least one of {title, cue_sheet,
# dense_paragraph, bullets} to be present in the body. When none are, this
# is a business error, not a schema violation — the JSON parses, the
# fields are the right type, they just don't ask the server to do anything.
description: Bad Request — PATCH body did not include any ETR content field to update.
content:
  application/json:
    schema:
      $ref: "../../../_shared/schemas/ApiErrorResponse.yaml"
    examples:
      patch_body_empty:
        summary: No ETR field present in the PATCH body
        value:
          code: "CONS_102"
          key: "CONSPECTUS_PATCH_BODY_EMPTY"
          message: "PATCH body must include at least one of `title`, `cue_sheet`, `dense_paragraph`, or `bullets`."
          source: "business"
