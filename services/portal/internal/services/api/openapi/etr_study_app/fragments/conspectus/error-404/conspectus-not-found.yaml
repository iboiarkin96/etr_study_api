# Per-resource 404 — Conspectus not found for the calling tenant.
#
# Shared across every read/write conspectus operation that resolves a row
# by `conspectus_uuid`. Deliberately collapses «row exists but not owned
# by this tenant» into 404 — the API never leaks cross-tenant existence
# (no 403). Mirrors CONS_404.
description: Not Found — no conspectus matches the given `conspectus_uuid` for this tenant.
content:
  application/json:
    schema:
      $ref: "../../../_shared/schemas/ApiErrorResponse.yaml"
    examples:
      conspectus_not_found:
        summary: No conspectus with the given uuid for the caller
        value:
          code: "CONS_404"
          key: "CONSPECTUS_NOT_FOUND"
          message: "Conspectus not found for the calling tenant."
          source: "business"
