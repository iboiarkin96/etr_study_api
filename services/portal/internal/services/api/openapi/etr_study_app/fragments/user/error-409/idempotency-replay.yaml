# Per-resource 409 — Idempotency-Key replay with different payload.
#
# Common to every user write operation (createUser, updateUser, patchUser).
# The server compares the hash of the incoming payload with the hash stored
# for the (client_uuid, endpoint, Idempotency-Key) tuple. Mismatch → 409.
description: Conflict — Idempotency-Key was previously seen with a different payload.
content:
  application/json:
    schema:
      $ref: "../../../_shared/schemas/ApiErrorResponse.yaml"
    examples:
      idempotency_replay_mismatch:
        summary: Idempotency-Key replayed with a different user payload
        value:
          code: "IDEMP_001"
          key: "idempotency_replay_mismatch"
          message: "Idempotency-Key has been seen with a different payload within the 24 h window."
          source: "business"
