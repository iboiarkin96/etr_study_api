# Per-resource 409 — optimistic-concurrency mismatch on reviewConspectus.
#
# The client passes `expected_schedule_revision` in the review body; the
# server compares it to the row's `schedule_revision`. Mismatch → 409.
# Distinct from the generic idempotency-replay 409 (IDEMP_001).
description: Conflict — `expected_schedule_revision` does not match the current schedule revision.
content:
  application/json:
    schema:
      $ref: "../../../_shared/schemas/ApiErrorResponse.yaml"
    examples:
      review_revision_conflict:
        summary: Schedule was updated by a concurrent request; caller had stale revision
        value:
          code: "CONS_409"
          key: "CONSPECTUS_REVIEW_REVISION_CONFLICT"
          message: "`expected_schedule_revision` does not match the current schedule revision. Refetch the conspectus and retry."
          source: "business"
