# Per-resource 404 — User row not found by composite natural key.
#
# Shared across every read/write user operation that resolves a user by
# `(system_uuid, system_user_id)`: getUserBySystemUserId,
# updateUserBySystemUserId, patchUserBySystemUserId. Mirrors
# `USER_NOT_FOUND_ERROR_EXAMPLE = USER_404.as_detail("business")`
# in app/openapi/examples/errors.py.
description: Not Found — no user matches the composite natural key `(system_uuid, system_user_id)`.
content:
  application/json:
    schema:
      $ref: "../../../_shared/schemas/ApiErrorResponse.yaml"
    examples:
      user_not_found:
        summary: No user with the given system_user_id + system_uuid
        value:
          code: "USER_404"
          key: "USER_NOT_FOUND"
          message: "User with this `system_user_id` and `system_uuid` was not found."
          source: "business"
