# Per-resource 404 — one of the referenced FK targets is not owned by the learner.
#
# `createErrorLog` accepts optional `conspectus_uuid` / `review_log_id`.
# If either is present but the referenced row is missing or not owned by
# the calling tenant, the server returns 404 with ERR_404. Deliberately
# collapses «row exists but not owned» into 404 to avoid cross-tenant
# existence leaks.
description: Not Found — a referenced `conspectus_uuid` or `review_log_id` is missing or not owned by the caller.
content:
  application/json:
    schema:
      $ref: "../../../_shared/schemas/ApiErrorResponse.yaml"
    examples:
      error_log_reference_not_found:
        summary: "`conspectus_uuid` is present but not owned by the calling tenant"
        value:
          code: "ERR_404"
          key: "ERROR_LOG_REFERENCE_NOT_FOUND"
          message: "Referenced `conspectus_uuid` or `review_log_id` is missing or not owned by the caller."
          source: "business"
